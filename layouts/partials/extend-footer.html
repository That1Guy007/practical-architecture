{{/* Buttondown newsletter embed — replace REPLACE_BUTTONDOWN_USERNAME with your Buttondown handle */}}
<div class="mt-8 mb-4 mx-auto max-w-xl px-4 text-center">
  <p class="text-lg font-semibold text-neutral-100 mb-1">
    Stay in the loop
  </p>
  <p class="text-sm text-neutral-400 mb-4">
    New posts delivered to your inbox. No spam, unsubscribe any time.
  </p>
  <form
    action="https://buttondown.com/api/emails/embed-subscribe/REPLACE_BUTTONDOWN_USERNAME"
    method="post"
    target="popupwindow"
    onsubmit="window.open('https://buttondown.com/REPLACE_BUTTONDOWN_USERNAME', 'popupwindow')"
    class="flex flex-col sm:flex-row gap-2 justify-center"
  >
    <input
      type="email"
      name="email"
      placeholder="you@example.com"
      required
      class="flex-1 px-4 py-2 rounded bg-neutral-800 border border-neutral-600
             text-neutral-100 placeholder-neutral-500 focus:outline-none
             focus:border-primary-500"
    />
    <input type="hidden" value="1" name="embed" />
    <button
      type="submit"
      class="px-6 py-2 rounded bg-primary-600 hover:bg-primary-500
             text-white font-medium transition-colors"
    >
      Subscribe
    </button>
  </form>
</div>
