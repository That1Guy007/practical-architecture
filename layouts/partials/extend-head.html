<script>
  // Guard the keyup handler: if the user types before index.json finishes
  // loading, fuse is still undefined — skip the search call instead of throwing.
  document.addEventListener('DOMContentLoaded', function () {
    var searchInput = document.getElementById('search-query');
    if (!searchInput) return;
    searchInput.onkeyup = function (event) {
      if (typeof fuse !== 'undefined' && fuse !== null) {
        executeQuery(this.value);
      }
    };
  });
</script>
