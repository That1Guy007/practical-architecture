{{- if site.Params.enableSearch | default false -}}
<script src="/js/fuse.min.js"></script>
<script>
(function () {
  var _Fuse = window.Fuse; // capture before deferred bundle can overwrite it

  document.addEventListener('DOMContentLoaded', function () {
    console.log('[PA-Search] DOMContentLoaded');
    console.log('[PA-Search] Fuse (captured):', typeof _Fuse);
    console.log('[PA-Search] window.Fuse:', typeof window.Fuse);

    var wrapper  = document.getElementById('search-wrapper');
    var modal    = document.getElementById('search-modal');
    var inputEl  = document.getElementById('search-query');
    var output   = document.getElementById('search-results');
    var showBtn  = document.getElementById('search-button');
    var showBtnM = document.getElementById('search-button-mobile');
    var hideBtn  = document.getElementById('close-search-button');

    console.log('[PA-Search] wrapper:', !!wrapper, 'input:', !!inputEl,
                'output:', !!output, 'showBtn:', !!showBtn);

    if (!wrapper || !inputEl || !output || !showBtn) {
      console.error('[PA-Search] ABORT — required element(s) missing');
      return;
    }

    var fuseIndex = null;
    var indexed   = false;
    var open      = false;

    function buildIndex() {
      if (indexed) return;
      var base = (wrapper.getAttribute('data-url') || '/').replace(/\/?$/, '/');
      console.log('[PA-Search] fetching:', base + 'index.json');
      var xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;
        console.log('[PA-Search] XHR readyState=4, status:', xhr.status);
        if (xhr.status !== 200) return;
        try {
          var data = JSON.parse(xhr.responseText);
          console.log('[PA-Search] index entries:', data.length);
          fuseIndex = new _Fuse(data, {
            shouldSort:     true,
            ignoreLocation: true,
            threshold:      0.4,
            includeMatches: true,
            keys: [
              { name: 'title',   weight: 0.8 },
              { name: 'section', weight: 0.2 },
              { name: 'summary', weight: 0.6 },
              { name: 'content', weight: 0.4 },
            ],
          });
          indexed = true;
          console.log('[PA-Search] Fuse ready');
        } catch (e) {
          console.error('[PA-Search] init error:', e);
        }
      };
      xhr.open('GET', base + 'index.json');
      xhr.send();
    }

    function openSearch() {
      buildIndex();
      document.body.style.overflow = 'hidden';
      wrapper.style.visibility = 'visible';
      inputEl.focus();
      open = true;
    }

    function closeSearch() {
      document.body.style.overflow = '';
      wrapper.style.visibility = 'hidden';
      inputEl.value    = '';
      output.innerHTML = '';
      open = false;
    }

    function runSearch(term) {
      console.log('[PA-Search] runSearch term:', JSON.stringify(term),
                  'fuseReady:', !!fuseIndex);
      if (!fuseIndex || !term.trim()) { output.innerHTML = ''; return; }
      var hits = fuseIndex.search(term).slice(0, 12);
      console.log('[PA-Search] hits:', hits.length);
      output.innerHTML = hits.map(function (r) {
        var it = r.item;
        return '<li class="mb-2"><a class="flex items-center px-3 py-2 rounded-md ' +
          'bg-neutral-100 dark:bg-neutral-700 hover:bg-primary-100 ' +
          'dark:hover:bg-primary-900" href="' + (it.permalink || '#') + '">' +
          '<div class="grow">' +
          '<div class="-mb-1 text-lg font-bold">' + (it.title || '') + '</div>' +
          '<div class="text-sm text-neutral-500 dark:text-neutral-400">' +
            (it.section || '') +
            (it.date ? '<span class="px-2 text-primary-500">&middot;</span>' + it.date : '') +
          '</div>' +
          '<div class="text-sm italic">' + (it.summary || '') + '</div>' +
          '</div>' +
          '<div class="ml-2 ltr:block rtl:hidden text-neutral-500">&rarr;</div>' +
          '</a></li>';
      }).join('');
    }

    showBtn.onclick  = function (e) { e.preventDefault(); openSearch(); };
    if (showBtnM) showBtnM.onclick = function (e) { e.preventDefault(); openSearch(); };
    hideBtn.onclick  = function (e) { e.preventDefault(); closeSearch(); };
    wrapper.onclick  = function (e) { if (e.target === wrapper) closeSearch(); };
    modal.onclick    = function (e) { e.stopPropagation(); };
    inputEl.onkeyup  = function ()  { runSearch(this.value); };

    document.addEventListener('keydown', function (e) {
      var tag = document.activeElement ? document.activeElement.tagName : '';
      var isField = tag === 'INPUT' || tag === 'TEXTAREA' ||
                    (document.activeElement && document.activeElement.isContentEditable);
      if (e.key === '/' && !open && !isField) { e.preventDefault(); openSearch(); }
      if (e.key === 'Escape' && open) { closeSearch(); }
    });

    console.log('[PA-Search] handlers wired');
  });
}());
</script>
{{- end -}}
