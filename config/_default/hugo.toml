baseURL = "https://practical-architecture.com/"
defaultContentLanguage = "en"
title = "Practical Architecture"
enableEmoji = true
enableRobotsTXT = true
summaryLength = 30
paginate = 10

[build]
  writeStats = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[related]
  includeNewer = false
  threshold = 80
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 100

  [[related.indices]]
    name = "categories"
    weight = 80

  [[related.indices]]
    name = "series"
    weight = 50

  [[related.indices]]
    name = "date"
    weight = 10
